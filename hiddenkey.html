<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE ACCESS // 03</title>

<style>
    body {
        margin: 0;
        background-color: black;
        color: #00ff66;
        font-family: monospace;
        overflow: hidden;
    }

    .container {
        text-align: center;
        padding-top: 80px;
    }

    .glow {
        text-shadow: 0 0 5px #00ff66, 0 0 10px #00ff66;
    }

    input {
        background: black;
        border: 1px solid #00ff66;
        color: #00ff66;
        padding: 10px;
        font-family: monospace;
        margin-top: 20px;
        width: 250px;
    }

    button {
        margin-top: 20px;
        padding: 10px 20px;
        background: black;
        border: 1px solid #00ff66;
        color: #00ff66;
        cursor: pointer;
        font-family: monospace;
    }

    button:hover {
        background: #00ff66;
        color: black;
    }

    #result {
        margin-top: 20px;
    }

    /* fake falling code animation */
    .matrix {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        opacity: 0.15;
        font-size: 14px;
        overflow: hidden;
        white-space: nowrap;
    }

    .hidden-key {
        color: black; /* invisible on black background */
    }
</style>
</head>

<body>

<div class="matrix">
    0101010101010101010101010101010101010101010<br>
    SYSTEM_NODE_ACTIVE<br>
    ENCRYPTING_LAYER_3<br>
    ACCESS_DENIED_ACCESS_DENIED_ACCESS_DENIED<br>
    0101010101010101010101010101010101010101010<br>
</div>

<div class="container">
    <h1 class="glow">SYSTEM NODE // 03</h1>

    <p class="glow">
        Nothing here is visible. But everything is present.
    </p>

    <p class="glow">
        Enter hidden key to continue:
    </p>

    <input type="text" id="keyInput" placeholder="enter key...">
    <br>
    <button onclick="checkKey()">UNLOCK</button>

    <button onclick="diagnostics()">RUN DIAGNOSTICS</button>

    <p id="result"></p>

    <!-- hidden key (invisible text) -->
    <div class="hidden-key">happybirthday</div>
</div>

<script>
function checkKey() {
    const input = document.getElementById("keyInput").value.trim().toLowerCase();
    const result = document.getElementById("result");

    if (input === "happybirthday") {
        result.innerHTML = "ACCESS GRANTED ✓ Next node unlocked...";
    } else {
        result.innerHTML = "ACCESS DENIED ✗";
    }
}

function diagnostics() {
    document.getElementById("result").innerHTML = "hehe it tickles!";
}
</script>

</body>
</html>
