<!DOCTYPE html>
<html>
<head>
<title>Level 2</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
  overflow: hidden;
}

#screen {
  padding: 40px;
  white-space: pre-line;
  font-size: 18px;
}

.cursor {
  display: inline-block;
  width: 10px;
  background: #00ff00;
  animation: blink 0.8s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}
</style>
</head>

<body>

<div id="screen"></div>

<script>
const screen = document.getElementById("screen");

function typeText(text, delay = 25) {
  return new Promise(resolve => {
    let i = 0;
    let interval = setInterval(() => {
      screen.innerHTML += text[i];
      i++;
      if (i >= text.length) {
        clearInterval(interval);
        screen.innerHTML += "\n\n";
        resolve();
      }
    }, delay);
  });
}

async function run() {
  await typeText("TRANSMISSION RECEIVED...");
  await typeText("CONNECTING TO SIGNAL...");
  await typeText("SIGNAL STABLE.");
  await typeText("\nDECODE THIS PAYLOAD:\n");

  await typeText("R29vZC4gVGhlIG1lc3NhZ2UgaXMgaW5jb21wbGV0ZS4=");
  await typeText("\nACCESS NEXT NODE WHEN READY → level2b.html");
}

run();
</script>

</body>
</html>
