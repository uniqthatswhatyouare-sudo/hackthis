<!DOCTYPE html>
<html>
<head>
<title>Level 2</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
}

#screen {
  padding: 40px;
  font-size: 18px;
  white-space: pre-line;
}

.cursor {
  display: inline-block;
  width: 10px;
  background: #00ff00;
  animation: blink 0.7s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

input {
  background: black;
  border: 1px solid #00ff00;
  color: #00ff00;
  padding: 10px;
  font-family: monospace;
  margin-top: 15px;
}

button {
  margin-left: 10px;
  background: black;
  border: 1px solid #00ff00;
  color: #00ff00;
  padding: 10px;
  cursor: pointer;
}

button:hover {
  background: #00ff00;
  color: black;
}
</style>
</head>

<body>

<div id="screen"></div>

<div style="padding:40px;">
  <p>ENTER DECRYPTED KEY:</p>
  <input id="code">
  <button onclick="check()">SUBMIT</button>
</div>

<script>
const screen = document.getElementById("screen");

function type(text, delay = 30) {
  return new Promise(resolve => {
    let i = 0;
    let interval = setInterval(() => {
      screen.innerHTML += text[i];
      i++;
      if (i >= text.length) {
        clearInterval(interval);
        screen.innerHTML += "\n";
        resolve();
      }
    }, delay);
  });
}

async function start() {
  await type("BOOTING SECURE CHANNEL...");
  await type("ACCESSING SYSTEM NODE...");
  await type("\n>>> CAN YOU DECODE THIS?");
  await type("\nPAYLOAD:");
  await type("MTAwMQ=="); // Base64 for "1001"
}

start();

function check() {
  let input = document.getElementById("code").value.trim();

  if (input === "1001") {
    screen.innerHTML += "\n\nACCESS GRANTED → LEVEL 3 UNLOCKED";

    setTimeout(() => {
      window.location.href = "level3.html";
    }, 1200);

  } else {
    screen.innerHTML += "\n\nACCESS DENIED";
  }
}
</script>

</body>
</html>
