<!DOCTYPE html>
<html>
<head>
<title>Level 2 - Access Gate</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
}

#screen {
  padding: 40px;
  white-space: pre-line;
  font-size: 18px;
}

input {
  background: black;
  border: 1px solid #00ff00;
  color: #00ff00;
  padding: 10px;
  font-family: monospace;
  margin-top: 15px;
}

button {
  margin-left: 10px;
  background: black;
  border: 1px solid #00ff00;
  color: #00ff00;
  padding: 10px;
  cursor: pointer;
}

button:hover {
  background: #00ff00;
  color: black;
}

.cursor {
  display: inline-block;
  width: 10px;
  background: #00ff00;
  animation: blink 0.8s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}
</style>
</head>

<body>

<div id="screen"></div>

<div style="padding:40px;">
  <input id="code" placeholder="ENTER ACCESS KEY">
 <button onclick="check()">ENTER</button>
</div>

<script>
const screen = document.getElementById("screen");

function typeText(text, delay = 20) {
  return new Promise(resolve => {
    let i = 0;
    let interval = setInterval(() => {
      screen.innerHTML += text[i];
      i++;
      if (i >= text.length) {
        clearInterval(interval);
        screen.innerHTML += "\n";
        resolve();
      }
    }, delay);
  });
}

async function start() {
  await typeText("TRANSMISSION RECEIVED...");
  await typeText("DECODING BASE SIGNAL...");
  await typeText("\nDECODED MESSAGE:");
  await typeText("Good. The message is incomplete.");
  await typeText("Secondary system detected.");
  await typeText("ACCESS KEY REQUIRED: 1001");
  await typeText("\nAwaiting authentication...\n");
}

function check() {
  let input = document.getElementById("code").value.trim();

  if (input === "1001") {
    screen.innerHTML += "\nAUTH SUCCESSFUL...\nACCESS GRANTED → NODE 2B";
    
    setTimeout(() => {
      window.location.href = "level2b.html";
    }, 1200);

  } else {
    screen.innerHTML += "\nAUTH FAILED";
  }
}

start();
</script>

</body>
</html>
