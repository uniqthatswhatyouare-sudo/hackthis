<!DOCTYPE html>
<html>
<head>
<title>Level 2</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
}

#screen {
  padding: 40px;
  white-space: pre-line;
  font-size: 18px;
}

button {
  margin-top: 20px;
  background: black;
  border: 1px solid #00ff00;
  color: #00ff00;
  padding: 10px;
  cursor: pointer;
  font-family: monospace;
}

button:hover {
  background: #00ff00;
  color: black;
}

input {
  background: black;
  border: 1px solid #00ff00;
  color: #00ff00;
  padding: 10px;
  font-family: monospace;
  margin-top: 10px;
}
</style>
</head>

<body>

<div id="screen"></div>

<div style="padding:40px;">
  <button onclick="decode()">DECODE SIGNAL</button>

  <div id="authBox" style="display:none;">
    <p>ENTER ACCESS KEY:</p>
    <input id="code">
    <button onclick="check()">ENTER</button>
  </div>
</div>

<script>
const screen = document.getElementById("screen");

// STEP 1 — only base64 shown
screen.innerHTML = `
TRANSMISSION RECEIVED...
SIGNAL LOCKED.

PAYLOAD:
R29vZC4gVGhlIG1lc3NhZ2UgaXMgaW5jb21wbGV0ZS4=
`;

function decode() {
  // STEP 2 — reveal hint ONLY after interaction
  screen.innerHTML += `

DECODING SIGNAL...
...

DECODE COMPLETE.

HINT:
Good. The message is incomplete.
Secondary encryption detected.
`;

  document.getElementById("authBox").style.display = "block";
}

function check() {
  let input = document.getElementById("code").value.trim();

  if (input === "1001") {
    screen.innerHTML += "\n\nAUTH SUCCESSFUL → ACCESS GRANTED";
    setTimeout(() => {
      window.location.href = "level2b.html";
    }, 1200);
  } else {
    screen.innerHTML += "\n\nACCESS DENIED";
  }
}
</script>

</body>
</html>
