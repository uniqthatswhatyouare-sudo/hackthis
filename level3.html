<!DOCTYPE html>
<html>
<head>
<title>Level 3</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
}

#screen {
  padding: 40px;
  font-size: 18px;
  white-space: pre-line;
}

input {
  background: black;
  border: 1px solid #00ff00;
  color: #00ff00;
  padding: 10px;
  font-family: monospace;
  margin-top: 15px;
  width: 250px;
}

button {
  margin-left: 10px;
  background: black;
  border: 1px solid #00ff00;
  color: #00ff00;
  padding: 10px;
  cursor: pointer;
}

button:hover {
  background: #00ff00;
  color: black;
}
</style>
</head>

<body>

<!-- HIDDEN KEY: iloveyou -->

<div id="screen"></div>

<div style="padding:40px;">
  <p>ENTER DECRYPTED SIGNAL:</p>
  <input id="code" placeholder="enter key...">
  <button onclick="check()">SUBMIT</button>
</div>

<script>
const screen = document.getElementById("screen");

function type(text, delay = 25) {
  return new Promise(resolve => {
    let i = 0;
    let interval = setInterval(() => {
      screen.innerHTML += text[i];
      i++;
      if (i >= text.length) {
        clearInterval(interval);
        screen.innerHTML += "\n";
        resolve();
      }
    }, delay);
  });
}

async function start() {
  await type("BOOT SEQUENCE INITIATED...");
  await type("SCANNING SIGNAL NETWORK...");
  await type("\nERROR: DATA CORRUPTION DETECTED");

  await type("\nANALYSIS:");
  await type("SOME DATA IS NOT VISIBLE IN OUTPUT");
  await type("SOURCE ≠ DISPLAYED SIGNAL");

  
  await type("SYSTEM WAITING FOR AUTH KEY...");
}

start();

function check() {
  let input = document.getElementById("code").value.trim().toLowerCase();

  if (input === "iloveyou") {
    screen.innerHTML += "\n\nACCESS GRANTED → LEVEL COMPLETE";

    setTimeout(() => {
      window.location.href = "level4.html";
    }, 1200);

  } else {
    screen.innerHTML += "\n\nACCESS DENIED";
  }
}
</script>

</body>
</html>
