<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE // ACCESS</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff66;
    font-family: "Courier New", monospace;
    font-size: 20px;
}

#terminal {
    padding: 30px;
    white-space: pre-line;
}
</style>

</head>

<body>

<div id="terminal"></div>

<script>
const terminal = document.getElementById("terminal");

const lines = [
"> Booting node 04...",
"> Establishing secure connection...",
"> Verifying system integrity...",
"> WARNING: Display output incomplete.",
"> Nothing here is visible.",
"> But everything is present.",
"> Awaiting hidden key..."
];

let i = 0;
let charIndex = 0;

function typeLine() {
    if (i >= lines.length) {
        showInput();
        return;
    }

    let line = lines[i];

    if (charIndex < line.length) {
        terminal.innerHTML += line.charAt(charIndex);
        charIndex++;
        setTimeout(typeLine, 35);
    } else {
        terminal.innerHTML += "<br>";
        i++;
        charIndex = 0;
        setTimeout(typeLine, 500);
    }
}

function showInput() {
    terminal.innerHTML += "<br><br>";

    terminal.innerHTML += `
        <input id="keyInput" placeholder="enter hidden key..." style="
            background:black;
            border:1px solid #00ff66;
            color:#00ff66;
            font-size:18px;
            padding:10px;
            font-family:monospace;
        ">

        <button onclick="checkKey()" style="
            background:black;
            border:1px solid #00ff66;
            color:#00ff66;
            padding:10px;
            margin-left:10px;
            cursor:pointer;
            font-family:monospace;
        ">UNLOCK</button>

        <button onclick="diagnostics()" style="
            background:black;
            border:1px solid #00ff66;
            color:#00ff66;
            padding:10px;
            margin-left:10px;
            cursor:pointer;
            font-family:monospace;
        ">RUN DIAGNOSTICS</button>

        <p id="result"></p>
    `;
}

function checkKey() {
    const input = document.getElementById("keyInput").value.trim().toLowerCase();
    const result = document.getElementById("result");

    if (input === "happybirthday") {
        result.innerHTML = "ACCESS GRANTED ✓";

        setTimeout(() => {
            window.location.href = "level5.html";
        }, 1200);

    } else {
        result.innerHTML = "ACCESS DENIED ✗";
    }
}

function diagnostics() {
    const result = document.getElementById("result");

    const lines = [
        "> Running diagnostics...",
        "> Checking memory...",
        "> Checking CPU...",
        "> Scanning system files...",
        "> Looking for bugs...",
        "> hehe it tickles!"
    ];

    result.innerHTML = "";

    let i = 0;
    let charIndex = 0;

    function typeLine() {
        if (i >= lines.length) return;

        let line = lines[i];

        if (charIndex < line.length) {
            result.innerHTML += line.charAt(charIndex);
            charIndex++;
            setTimeout(typeLine, 25);
        } else {
            result.innerHTML += "<br>";
            i++;
            charIndex = 0;
            setTimeout(typeLine, 400);
        }
    }

    typeLine();
}

typeLine();
</script>

</body>
</html>
