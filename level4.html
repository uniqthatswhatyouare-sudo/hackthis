.cursor {
    display: inline-block;
    width: 10px;
    background: #00ff66;
    margin-left: 5px;
    animation: blink 0.8s infinite;
}

@keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0; }
    100% { opacity: 1; }
}

/* glitch flicker effect */
@keyframes flicker {
    0% { opacity: 1; }
    2% { opacity: 0.8; }
    4% { opacity: 1; }
    50% { opacity: 0.95; }
    100% { opacity: 1; }
}

body {
