<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>NODE // 05 - AUDIO VAULT</title>

<style>
body{
    margin:0;
    background:#000;
    color:#00ff66;
    font-family:"Courier New", monospace;
    overflow:hidden;
}

#terminal{
    padding:30px;
    white-space:pre-wrap;
    font-size:20px;
    line-height:1.6;
}

button{
    background:black;
    color:#00ff66;
    border:1px solid #00ff66;
    padding:10px 18px;
    font-family:monospace;
    font-size:18px;
    margin-top:15px;
    margin-right:10px;
    cursor:pointer;
}

button:hover{
    background:#00ff66;
    color:black;
}

.glitch{
    animation: flicker 0.12s infinite;
}

@keyframes flicker{
    0%{opacity:1;}
    50%{opacity:0.7;}
    100%{opacity:1;}
}
</style>

</head>

<body>

<div id="terminal"></div>

<!-- AUDIO FILE -->
<audio id="song" src="isitacrime.mp3"></audio>

<script>

const terminal = document.getElementById("terminal");

/* =========================
   CLEAN TYPE ENGINE
========================= */

function typeLine(text, callback){
    let i = 0;

    function run(){
        if(i < text.length){
            terminal.innerHTML += text[i];
            i++;
            setTimeout(run, 15);
        } else {
            terminal.innerHTML += "<br>";
            if(callback) setTimeout(callback, 250);
        }
    }

    run();
}

/* =========================
   BOOT SEQUENCE
========================= */

function start(){

typeLine("> Booting secure node 05...", () => {
typeLine("> Loading audio vault subsystem...", () => {
typeLine("> Establishing encrypted connection...", () => {
typeLine("> Scanning authorization layers...", () => {
typeLine("> WARNING: Restricted media detected.", () => {
typeLine("> Initializing access protocol...", () => {
typeLine("> Awaiting operator input...", showSystem);
});
});
});
});
});
});

}

start();

/* =========================
   SYSTEM UI
========================= */

function showSystem(){

terminal.innerHTML += `
<br>
----------------------------------<br>
CONNECTION      OFFLINE<br>
SESSION         INACTIVE<br>
IDENTITY        UNVERIFIED<br>
AUDIO VAULT     LOCKED<br>
----------------------------------<br><br>

<button onclick="step1()">ESTABLISH CONNECTION</button>
`;

}

/* =========================
   STEP 1
========================= */

function step1(){

typeLine("> Establishing connection...");

setTimeout(() => {

typeLine("> Handshake complete");
typeLine("> Connection ONLINE");

setTimeout(() => {

terminal.innerHTML += `
<br>CONNECTION ONLINE ✔<br><br>
<button onclick="step2()">INITIALIZE SESSION</button>
`;

}, 500);

}, 1200);

}

/* =========================
   STEP 2
========================= */

function step2(){

typeLine("> Initializing session...");

setTimeout(() => {

typeLine("> Session ACTIVE");

setTimeout(() => {

terminal.innerHTML += `
<br>SESSION ACTIVE ✔<br><br>
<button onclick="step3()">VERIFY CREDENTIALS</button>
`;

}, 500);

}, 1200);

}

/* =========================
   STEP 3
========================= */

function step3(){

typeLine("> Requesting credentials...");

setTimeout(() => {

typeLine("> Credentials VERIFIED");

setTimeout(() => {

terminal.innerHTML += `
<br>IDENTITY VERIFIED ✔<br><br>
<button onclick="step4()">MOUNT VAULT</button>
`;

}, 500);

}, 1400);

}

/* =========================
   STEP 4
========================= */

function step4(){

typeLine("> Mounting secure audio vault...");

setTimeout(() => {

typeLine("> Vault mounted");

setTimeout(() => {

terminal.innerHTML += `
<br>AUDIO VAULT MOUNTED ✔<br><br>
<button onclick="step5()">RECOVER AUDIO NODE</button>
`;

}, 500);

}, 1400);

}

/* =========================
   STEP 5
========================= */

function step5(){

typeLine("> Recovering audio node...");
typeLine("> Searching archive...");
typeLine("> Decrypting file...");
typeLine("> File located");

setTimeout(() => {

terminal.innerHTML += `
<br><br>
FILE: isitacrime.mp3<br><br>

<button onclick="downloadFile()">DOWNLOAD FILE</button>
<button onclick="analyzeFile()">ANALYZE FILE</button>
`;

}, 1500);

}

/* =========================
   DOWNLOAD AUDIO
========================= */

function downloadFile(){

terminal.classList.add("glitch");

typeLine("> Preparing secure transfer...");
typeLine("> Calculating checksum...");
typeLine("> Verifying integrity...");
typeLine("> Transfer authorized");

setTimeout(() => {

const audio = document.getElementById("song");
audio.play().catch(()=>{}); // safe fallback

const a = document.createElement("a");
a.href = "isitacrime.mp3";
a.download = "isitacrime.mp3";
document.body.appendChild(a);
a.click();
document.body.removeChild(a);

terminal.classList.remove("glitch");

showFinal();

}, 1800);

}

/* =========================
   FINAL NODE
========================= */

function showFinal(){

terminal.innerHTML += `
<br><br>
----------------------------------<br>
TRANSFER COMPLETE<br>
AUDIO NODE UNLOCKED<br>
----------------------------------<br><br>

<button onclick="goNext()">ENTER FINAL NODE</button>
`;

}

function goNext(){
    window.location.href = "level6.html";
}

/* =========================
   ANALYZE MESSAGE
========================= */

function analyzeFile(){

typeLine("> Running semantic analysis...");
typeLine("> Processing emotional signature...");

setTimeout(() => {

terminal.innerHTML += `
<br><br>
RESULT:<br><br>
"This song sounds like you wrote it to me."
`;

}, 1200);

}

</script>

    
</body>
</html>
