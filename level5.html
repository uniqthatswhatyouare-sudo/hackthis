<!DOCTYPE html>
<html lang="en">

    
<head>
<meta charset="UTF-8">
<title>FORENSIC NODE // LEVEL 5</title>

<style>

html, body{
    margin:0;
    height:100%;
    background:black;
    color:#00ff66;
    font-family:"Courier New", monospace;
}

/* allow scrolling */
body{
    overflow:auto;
}

#terminal{
    height:100vh;
    overflow-y:auto;
    padding:30px;
    white-space:pre-wrap;
    font-size:18px;
    line-height:1.6;
}

button{
    background:black;
    color:#00ff66;
    border:1px solid #00ff66;
    padding:10px 14px;
    font-family:monospace;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#00ff66;
    color:black;
}

.glitch{
    animation: flicker 0.1s infinite;
}

@keyframes flicker{
    0%{opacity:1;}
    50%{opacity:0.7;}
    100%{opacity:1;}
}

</style>

</head>

<body>

<div id="terminal"></div>

<audio id="song" src="isitacrime.mp3"></audio>

<script>

const terminal = document.getElementById("terminal");

/* TYPE ENGINE */
function typeLine(text, callback){
    let i = 0;

    function run(){
        if(i < text.length){
            terminal.innerHTML += text[i];
            i++;
            terminal.scrollTop = terminal.scrollHeight;
            setTimeout(run, 12);
        } else {
            terminal.innerHTML += "<br>";
            terminal.scrollTop = terminal.scrollHeight;
            if(callback) setTimeout(callback, 300);
        }
    }

    run();
}

/* BOOT SEQUENCE */
function startBoot(){

typeLine("> Initializing forensic environment...", () => {
typeLine("> Mounting system kernel...", () => {
typeLine("> Scanning media directories...", () => {
typeLine("> Detecting audio anomalies...", () => {
typeLine("> WARNING: corrupted file signature found...", () => {
typeLine("> SYSTEM READY", showLogs);
});
});
});
});
});

}

/* LOG SCREEN */
function showLogs(){

terminal.innerHTML += `
<br>
----------------------------------<br>
FORENSIC LOG STREAM ACTIVE<br>
----------------------------------<br><br>

12:01 system boot complete<br>
12:02 scanning storage sectors...<br>
12:03 anomaly detected in /audio/<br>
12:04 isolating corrupted media file...<br><br>

<button onclick="openCase()">INVESTIGATE FILE</button>
`;

}

/* CASE FILE */
function openCase(){

terminal.innerHTML += `
<br>
> Accessing forensic database...<br>
> Loading case files...<br><br>
`;

setTimeout(() => {

terminal.innerHTML += `
<br>
----------------------------------<br>
FORENSIC CASE FILE: AUDIO_7749<br>
----------------------------------<br><br>

FILE LOCATION: /vault/quarantine/<br>
STATUS: recoverable<br>
SIGNATURE: emotional anomaly detected<br><br>

<button onclick="startRecovery()">INITIATE RECOVERY</button>
`;

}, 1200);

}

/* RECOVERY */
function startRecovery(){

terminal.innerHTML += `
<br>
> Reconstructing audio data...<br>
> Rebuilding metadata...<br>
`;

setTimeout(() => {

terminal.innerHTML += `
<br>
RECOVERY COMPLETE<br><br>

FILE: isitacrime.mp3<br><br>

<button onclick="downloadSong()">DOWNLOAD</button>
<button onclick="analyzeSong()">ANALYZE</button>
`;

}, 2500);

}

/* DOWNLOAD */
function downloadSong(){

terminal.classList.add("glitch");

const audio = document.getElementById("song");
audio.play().catch(()=>{});

const link = document.createElement("a");
link.href = "isitacrime.mp3";
link.download = "isitacrime.mp3";
document.body.appendChild(link);
link.click();
link.remove();

terminal.classList.remove("glitch");

terminal.innerHTML += `
<br><br>
TRANSFER COMPLETE<br>
AUDIO EXTRACTED<br>
`;

}

/* ANALYZE */
function analyzeSong(){

terminal.innerHTML += `
<br>
> Running emotional analysis...<br>
`;

setTimeout(() => {

terminal.innerHTML += `
<br><br>
RESULT:<br><br>
"This song sounds like you wrote it to me."<br>
`;

showFinal();

}, 1200);

}

/* FINAL SCREEN */
function showFinal(){

terminal.innerHTML += `
<br><br>
----------------------------------<br>
SYSTEM ARCHIVE CLOSED<br>
----------------------------------<br><br>

<button onclick="goNext()">PROCEED</button>
`;

}

/* NEXT LEVEL */
function goNext(){
    window.location.href = "level6.html";
}

/* START */
startBoot();

</script>

</body>
</html>
