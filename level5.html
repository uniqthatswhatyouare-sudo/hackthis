<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>NODE // 05 - AUDIO VAULT</title>

<style>

body{
    margin:0;
    background:#000;
    color:#00ff66;
    font-family:"Courier New", monospace;
    overflow:hidden;
    animation:flicker 3s infinite;
}

#terminal{
    padding:30px;
    white-space:pre-wrap;
    font-size:20px;
    line-height:1.6;
}

    
button{
    background:black;
    color:#00ff66;
    border:1px solid #00ff66;
    padding:10px 18px;
    font-family:monospace;
    font-size:18px;
    margin-top:15px;
    margin-right:10px;
    cursor:pointer;
}

button:hover{
    background:#00ff66;
    color:black;
}

@keyframes flicker{
0%{opacity:1;}
2%{opacity:.95;}
4%{opacity:1;}
60%{opacity:.97;}
100%{opacity:1;}
}

.glitch{
    animation: glitch 0.12s infinite;
}

@keyframes glitch{
0%{opacity:1;}
50%{opacity:0.75;}
100%{opacity:1;}
}

</style>

</head>

<body>

<div id="terminal"></div>

<script>

const terminal = document.getElementById("terminal");

/* =========================
   CORE TYPE ENGINE
========================= */

function typeText(text, callback){
    let i = 0;

    function run(){
        if(i < text.length){
            terminal.innerHTML += text[i];
            i++;
            setTimeout(run, 18);
        } else {
            terminal.innerHTML += "<br>";
            if(callback) callback();
        }
    }

    run();
}

/* =========================
   BOOT SEQUENCE
========================= */

function startBoot(){

typeText("> Booting secure node 05...", () => {
typeText("> Loading audio vault subsystem...", () => {
typeText("> Establishing encrypted connection...", () => {
typeText("> Scanning authorization layers...", () => {
typeText("> WARNING: Restricted media detected.", () => {
typeText("> Initializing access protocol...", () => {
typeText("> Awaiting operator input...", showSystem);
});
});
});
});
});
});

}

startBoot();

/* =========================
   SYSTEM UI
========================= */

function showSystem(){

terminal.innerHTML += `
<br>
----------------------------------<br>
CONNECTION      OFFLINE<br>
SESSION         INACTIVE<br>
IDENTITY        UNVERIFIED<br>
AUDIO VAULT     LOCKED<br>
----------------------------------<br><br>

<button onclick="step1()">ESTABLISH CONNECTION</button>
`;

}

/* =========================
   STEP 1
========================= */

function step1(){

typeText("> Establishing connection...");

setTimeout(() => {

typeText("> Handshake sent...");
typeText("> Response received...");
typeText("> Secure connection ONLINE");

setTimeout(() => {

terminal.innerHTML += `
<br>
CONNECTION ONLINE ✔<br><br>
<button onclick="step2()">INITIALIZE SESSION</button>
`;

}, 600);

}, 1200);

}

/* =========================
   STEP 2
========================= */

function step2(){

typeText("> Initializing session...");

setTimeout(() => {

typeText("> Session ACTIVE");

setTimeout(() => {

terminal.innerHTML += `
<br>
SESSION ACTIVE ✔<br><br>
<button onclick="step3()">VERIFY CREDENTIALS</button>
`;

}, 600);

}, 1200);

}

/* =========================
   STEP 3
========================= */

function step3(){

typeText("> Requesting credentials...");

setTimeout(() => {

typeText("> Credentials VERIFIED");

setTimeout(() => {

terminal.innerHTML += `
<br>
IDENTITY VERIFIED ✔<br><br>
<button onclick="step4()">MOUNT VAULT</button>
`;

}, 600);

}, 1400);

}

/* =========================
   STEP 4
========================= */

function step4(){

typeText("> Mounting secure audio vault...");

setTimeout(() => {

typeText("> Mount successful");

setTimeout(() => {

terminal.innerHTML += `
<br>
AUDIO VAULT MOUNTED ✔<br><br>
<button onclick="step5()">RECOVER AUDIO NODE</button>
`;

}, 600);

}, 1400);

}

/* =========================
   STEP 5 - FILE REVEAL
========================= */

function step5(){

typeText("> Recovering audio node...");
typeText("> Searching secure archive...");
typeText("> Decrypting metadata...");
typeText("> File located");

setTimeout(() => {

terminal.innerHTML += `
<br><br>
FILE: isitacrime.mp3<br><br>

<button onclick="downloadFile()">DOWNLOAD FILE</button>
<button onclick="analyzeFile()">ANALYZE FILE</button>
`;

}, 1800);

}

/* =========================
   DOWNLOAD SYSTEM
========================= */

function downloadFile(){

terminal.classList.add("glitch");

typeText("> Preparing secure transfer...");
typeText("> Calculating checksum...");
typeText("> Verifying file integrity...");
typeText("> Transfer authorized");
typeText("> Initiating download...");

setTimeout(() => {

const a = document.createElement("a");
a.href = "isitacrime.mp3";
a.download = "isitacrime.mp3";
document.body.appendChild(a);
a.click();
document.body.removeChild(a);

terminal.classList.remove("glitch");

showFinal();

}, 2000);

}

/* =========================
   FINAL NODE BUTTON
========================= */

function showFinal(){

terminal.innerHTML += `
<br><br>
----------------------------------<br>
TRANSFER COMPLETE<br>
AUDIO NODE UNLOCKED<br>
----------------------------------<br><br>

<button onclick="goNext()">ENTER FINAL NODE</button>
`;

}

function goNext(){
    window.location.href = "level6.html";
}

/* =========================
   ANALYZE MESSAGE
========================= */

function analyzeFile(){

typeText("> Running semantic analysis...");
typeText("> Processing emotional signature...");

setTimeout(() => {

terminal.innerHTML += `
<br><br>
RESULT:<br><br>
"This song sounds like you wrote it to me."
`;

}, 1200);

}

</script>

</body>
</html>
