<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>NODE // LEVEL 6</title>

<style>

html, body{
    margin:0;
    height:100%;
    background:#000;
    color:#00ff66;
    font-family:"Courier New", monospace;
    overflow:auto;
}

/* flicker / hacker instability */
body{
    animation:flicker 3s infinite;
}

@keyframes flicker{
    0%{opacity:1;}
    2%{opacity:0.95;}
    4%{opacity:1;}
    50%{opacity:0.98;}
    100%{opacity:1;}
}

/* terminal */
#terminal{
    padding:30px;
    white-space:pre-wrap;
    font-size:18px;
    line-height:1.6;
}

/* buttons */
button{
    background:black;
    border:1px solid #00ff66;
    color:#00ff66;
    padding:10px 14px;
    font-family:monospace;
    cursor:pointer;
    margin-top:10px;
    margin-right:10px;
}

button:hover{
    background:#00ff66;
    color:black;
}

</style>

</head>

<body>

<div id="terminal"></div>

<audio id="song" src="whenwe.mp3"></audio>

<script>

const terminal = document.getElementById("terminal");

/* TYPE ENGINE (EVERY LINE EFFECT) */
function typeLine(text, callback){
    let i = 0;

    function run(){
        if(i < text.length){
            terminal.innerHTML += text.charAt(i);
            i++;
            terminal.scrollTop = terminal.scrollHeight;
            setTimeout(run, 10);
        } else {
            terminal.innerHTML += "<br>";
            terminal.scrollTop = terminal.scrollHeight;
            if(callback) setTimeout(callback, 250);
        }
    }

    run();
}

/* BOOT */
function startLevel6(){

typeLine("> booting NODE_LEVEL_06...", () => {
typeLine("> loading adaptive response engine...", () => {
typeLine("> scanning operator signature...", () => {
typeLine("> unknown operator detected...", () => {
typeLine("> attempting identification...", () => {
typeLine("> system ready.", showConsole);
});
});
});
});
});

}

/* START SCREEN */
function showConsole(){

terminal.innerHTML += `
<br>
----------------------------------<br>
LIVE SYSTEM ACTIVE<br>
----------------------------------<br><br>

Identity verification required.<br><br>

<button onclick="scan()">SCAN IDENTITY</button>
`;

terminal.scrollTop = terminal.scrollHeight;

}

/* STEP 1 */
function scan(){

typeLine("> scanning operator signature...", () => {
typeLine("> behavioral fingerprint match found...", () => {

terminal.innerHTML += `
<br>
Identity accepted.<br>
Confidence: 99.97%<br><br>

<button onclick="trace()">TRACE MEMORY</button>
`;

});

});

}

/* STEP 2 */
function trace(){

typeLine("> accessing memory database...", () => {
typeLine("> reconstructing emotional clusters...", () => {

terminal.innerHTML += `
<br>
MEMORY CLUSTERS FOUND<br><br>

[01] TRUST ✓<br>
[02] DISTANCE ✓<br>
[03] FUTURE ✓<br><br>

<button onclick="confirm()">CONFIRM LINK</button>
`;

});

});

}

/* STEP 3 */
function confirm(){

typeLine("> validating relationship graph...", () => {
typeLine("> emotional resonance confirmed...", () => {
typeLine("> initializing adaptive audio generation...", () => {

terminal.innerHTML += `
<br><br>
Synthesizing audio node...<br><br>

[██░░░░░░░░] 20%<br>
`;

setTimeout(() => {
terminal.innerHTML += `[█████░░░░░] 50%<br>`;
terminal.scrollTop = terminal.scrollHeight;
}, 800);

setTimeout(() => {
terminal.innerHTML += `[████████░░] 80%<br>`;
terminal.scrollTop = terminal.scrollHeight;
}, 1600);

setTimeout(() => {
terminal.innerHTML += `
[██████████] 100%<br><br>

FILE GENERATED: whenwe.mp3<br><br>

<button onclick="releaseSong()">RELEASE AUDIO</button>
`;
terminal.scrollTop = terminal.scrollHeight;
}, 2400);

});

});

});

}

/* STEP 4 */
function releaseSong(){

const audio = document.getElementById("song");
audio.play().catch(()=>{});

const link = document.createElement("a");
link.href = "whenwe.mp3";
link.download = "whenwe.mp3";
document.body.appendChild(link);
link.click();
link.remove();

terminal.innerHTML += `
<br><br>
----------------------------------<br>
MEDIA RELEASE COMPLETE<br>
----------------------------------<br><br>

<button onclick="showNote()">OPEN PRIVATE ANNOTATION</button>
`;

}

/* FINAL NOTE */
function showNote(){

terminal.innerHTML += `
<br><br>
----------------------------------<br>
PRIVATE ANNOTATION FOUND<br>
----------------------------------<br><br>

SOURCE: unknown<br>
TYPE: emotional fragment<br><br>

CONTENT:<br><br>

"this is the song i'll make love to you to."<br><br>

<button onclick="goNext()">PROCEED</button>
`;

}

/* NEXT LEVEL */
function goNext(){
    window.location.href = "level7.html";
}

/* START */
startLevel6();

</script>

</body>
</html>
