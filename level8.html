<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>FINAL NODE</title>

<style>

html, body{
    margin:0;
    height:100%;
    background:#000;
    color:#00ff66;
    font-family:"Courier New", monospace;
}

/* terminal */
#terminal{
    padding:30px;
    white-space:pre-wrap;
    font-size:18px;
    line-height:1.6;
}

/* hacker line animation */
.line{
    display:block;
    animation:glitch 0.12s ease-in-out;
}

@keyframes glitch{
    0%{opacity:0.2; transform:translateX(-1px);}
    20%{opacity:1; transform:translateX(1px);}
    40%{opacity:0.7; transform:translateX(-1px);}
    60%{opacity:1; transform:translateX(0);}
    100%{opacity:1;}
}

/* buttons */
button{
    background:black;
    color:#00ff66;
    border:1px solid #00ff66;
    padding:10px 16px;
    cursor:pointer;
    margin-top:15px;
}

button:hover{
    background:#00ff66;
    color:black;
}

</style>
</head>

<body>

<div id="terminal"></div>

<script>

const terminal = document.getElementById("terminal");

/* TYPEWRITER */
function typeLine(text, callback){

    let i = 0;
    let line = document.createElement("div");
    line.classList.add("line");
    terminal.appendChild(line);

    function run(){

        if(i < text.length){
            line.innerHTML += text.charAt(i);
            i++;
            terminal.scrollTop = terminal.scrollHeight;
            setTimeout(run, 10);
        } else {
            line.innerHTML += "<br>";
            if(callback) setTimeout(callback, 200);
        }
    }

    run();
}

/* PRINT */
function print(html){
    terminal.innerHTML += html;
}

/* START */
function start(){

typeLine("> Initializing final archive...", () => {
typeLine("> Checking integrity...", () => {
typeLine("> System stable.", showMenu);
});
});

}

/* MENU */
function showMenu(){

print(`
<br>
----------------------------------------
FINAL ARCHIVE
----------------------------------------

One encrypted record remains.

<br>
<button onclick="decrypt()">DECRYPT FINAL RECORD</button>
`);

}

/* DECRYPT */
function decrypt(){

terminal.innerHTML += "<br>";

typeLine("> Decrypting...", () => {
typeLine("> Access granted.", () => {

print(`
<br>
FINAL SYSTEM REPORT<br><br>

HAPPY BIRTHDAY<br>
VERSION 22.x<br><br>

PATCH NOTES:<br>
+ Increased wisdom<br>
+ More experience<br>
+ New memories unlocked<br>
+ Still good at being an antidepressant<br>
+ Still young<br>
+ A perfect husband-to-be<br><br>

KNOWN ISSUE:<br>
Distance between developers<br>
STATUS: Permanent fix in progress<br><br>

MAY THIS YEAR BRING YOU:<br>
> luck<br>
> happiness<br>
> dreams<br><br>

Thank you, Hacker Sir Dracarys.<br>
Happy Birthday.<br><br>

<button onclick="end()">SHUTDOWN</button>
`);

});
});

}

/* END */
function end(){

typeLine("> SYSTEM SHUTDOWN...", () => {
typeLine("3...", () => {
typeLine("2...", () => {
typeLine("1...", () => {
typeLine("Connection terminated.");
});
});
});
});

}

window.onload = start;

</script>

</body>
</html>
