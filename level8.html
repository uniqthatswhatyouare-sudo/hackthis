<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>FINAL NODE</title>

<style>

html, body{
    margin:0;
    height:100%;
    background:#000;
    color:#00ff66;
    font-family:"Courier New", monospace;
    overflow:auto;
}

#terminal{
    padding:30px;
    white-space:pre-wrap;
    font-size:18px;
    line-height:1.6;
    animation:flicker 3s infinite;
}

@keyframes flicker{
    0%{opacity:1;}
    2%{opacity:.95;}
    4%{opacity:1;}
    50%{opacity:.98;}
    100%{opacity:1;}
}

button{
    background:black;
    color:#00ff66;
    border:1px solid #00ff66;
    padding:10px 16px;
    font-family:monospace;
    cursor:pointer;
    margin-top:15px;
}

button:hover{
    background:#00ff66;
    color:black;
}

</style>

</head>

<body>

<div id="terminal"></div>

<script>

const terminal = document.getElementById("terminal");

/* TYPE ENGINE */
function typeLine(text, callback){

    let i = 0;

    function run(){
        if(i < text.length){
            terminal.innerHTML += text.charAt(i);
            i++;
            setTimeout(run, 10);
        } else {
            terminal.innerHTML += "<br>";
            if(callback) setTimeout(callback, 200);
        }
    }

    run();
}

/* PRINT */
function print(html){
    terminal.innerHTML += html;
}

/* START */
function startLevel8(){

    typeLine("> Initializing final archive...", () => {
    typeLine("> Closing active investigation...", () => {
    typeLine("> Verifying recovered assets...", () => {
    typeLine("> Checking archive integrity...", () => {
    typeLine("> No corrupted sectors detected.", () => {
    typeLine("> Preparing final report...", showConsole);
    });
    });
    });
    });
    });

}

/* MAIN SCREEN */
function showConsole(){

print(`
<br>
----------------------------------------
FINAL ARCHIVE
----------------------------------------

One encrypted record remains.

<br>

<button onclick="decryptFinal()">DECRYPT FINAL RECORD</button>
`);

}

/* DECRYPT */
function decryptFinal(){

terminal.innerHTML += "<br>";

typeLine("> Decrypting final record...", () => {
typeLine("> Access granted.", () => {
typeLine("> Rendering final report...", () => {

typeLine("FINAL SYSTEM REPORT", () => {

typeLine("HAPPY BIRTHDAY", () => {

typeLine("VERSION 22.x", () => {

typeLine("PATCH NOTES", () => {

typeLine("+ Increased wisdom.", () => {
typeLine("+ More experience gained.", () => {
typeLine("+ New memories unlocked.", () => {
typeLine("+ Still good at being an antidepressant.", () => {
typeLine("+ Still young.", () => {
typeLine("+ A perfect husband-to-be.", () => {

showKnownIssue();

});});});});});});});});});});});

}

/* KNOWN ISSUE */
function showKnownIssue(){

typeLine("KNOWN ISSUE", () => {
typeLine("Distance between developers.", () => {
typeLine("STATUS: Working on a permanent fix.", showMessage);
});
});
}

/* MESSAGE */
function showMessage(){

typeLine("MAY THIS YEAR BRING YOU", () => {

typeLine("> luck", () => {
typeLine("> happiness", () => {
typeLine("> more reasons to be curious", () => {
typeLine("> more ideas to build", () => {
typeLine("> more dreams to chase", () => {
typeLine("> more limits to push", showFinalReport);
});
});
});
});
});
});
}

/* FINAL */
function showFinalReport(){

typeLine("FINAL SYSTEM REPORT", () => {

typeLine("Investigation complete.", () => {
typeLine("Encryption layers bypassed.", () => {
typeLine("Integrity verified.", () => {

typeLine("No critical errors detected.", () => {

typeLine("Thank you, Hacker Sir Dracarys.", () => {

typeLine("Happy Birthday.", () => {

typeLine("> SYSTEM SHUTDOWN...", () => {

typeLine("3...", () => {
typeLine("2...", () => {
typeLine("1...", () => {

typeLine("Connection terminated.", () => {
typeLine("See you on the next adventure.");

});});});});});});});});});});});

}

/* START */
window.onload = startLevel8;

</script>

</body>
</html>
