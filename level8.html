<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>FINAL NODE</title>

<style>

html, body{
    margin:0;
    height:100%;
    background:#000;
    color:#00ff66;
    font-family:"Courier New", monospace;
}

/* terminal */
#terminal{
    padding:30px;
    white-space:pre-wrap;
    font-size:18px;
    line-height:1.6;
}

/* hacker animation */
.line{
    display:block;
    animation:glitch 0.12s ease-in-out;
}

@keyframes glitch{
    0%{opacity:0.2; transform:translateX(-1px);}
    20%{opacity:1; transform:translateX(1px);}
    40%{opacity:0.7; transform:translateX(-1px);}
    60%{opacity:1; transform:translateX(0);}
    100%{opacity:1;}
}

/* buttons */
button{
    background:black;
    color:#00ff66;
    border:1px solid #00ff66;
    padding:10px 16px;
    cursor:pointer;
    margin-top:15px;
}

button:hover{
    background:#00ff66;
    color:black;
}

</style>
</head>

<body>

<div id="terminal"></div>

<script>

const terminal = document.getElementById("terminal");

/* TYPE ENGINE */
function typeLine(text, callback){

    let i = 0;
    let line = document.createElement("div");
    line.classList.add("line");
    terminal.appendChild(line);

    function run(){
        if(i < text.length){
            line.innerHTML += text.charAt(i);
            i++;
            terminal.scrollTop = terminal.scrollHeight;
            setTimeout(run, 10);
        } else {
            line.innerHTML += "<br>";
            if(callback) setTimeout(callback, 150);
        }
    }

    run();
}

/* START */
function start(){

typeLine("> Initializing final archive...", () => {
typeLine("> Checking integrity...", () => {
typeLine("> System stable.", showMenu);
});
});

}

/* MENU */
function showMenu(){

terminal.innerHTML += `
<br>
----------------------------------------
FINAL ARCHIVE
----------------------------------------

One encrypted record remains.

<br>
<button onclick="decrypt()">DECRYPT FINAL RECORD</button>
`;

}

/* DECRYPT */
function decrypt(){

terminal.innerHTML += "<br>";

typeLine("> Decrypting...", () => {
typeLine("> Access granted.", () => {

const lines = [
"FINAL SYSTEM REPORT",
"",
"HAPPY BIRTHDAY",
"VERSION 22.x",
"",
"PATCH NOTES:",
"+ Increased wisdom",
"+ More experience",
"+ New memories unlocked",
"+ Still good at being an antidepressant",
"+ Still young",
"+ A perfect husband-to-be",
"",
"KNOWN ISSUE:",
"Distance between developers",
"",
"STATUS: Permanent fix in progress",
"",
"MAY THIS YEAR BRING YOU:",
"> luck",
"> happiness",
"> more reasons to be curious",
"> more ideas to build",
"> more dreams to chase",
"> more limits to push",
"",
"Thank you, Hacker Sir Dracarys.",
"Happy Birthday.",
"",
"> SYSTEM SHUTDOWN INITIATED",
"3...",
"2...",
"1...",
"Connection terminated."
];

let i = 0;

function nextLine(){
    if(i < lines.length){
        typeLine(lines[i], () => {
            i++;
            nextLine();
        });
    }
}

nextLine();

});
});

}

/* START */
window.onload = start;

</script>

</body>
</html>
